version: '3.9'

services:
  # ============================================================================
  # TimescaleDB - Time-series database for market data
  # ============================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: trading-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
      POSTGRES_USER: ${POSTGRES_USER:-trading_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user} -d ${POSTGRES_DB:-trading_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  # ============================================================================
  # Redis Cache - For caching frequently accessed data
  # ============================================================================
  redis-cache:
    image: redis:7-alpine
    container_name: trading-redis-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_CACHE_PASSWORD:-}
    ports:
      - "${REDIS_CACHE_PORT:-6379}:6379"
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - trading-network

  # ============================================================================
  # Redis Streams - For real-time market data streaming
  # ============================================================================
  redis-streams:
    image: redis:7-alpine
    container_name: trading-redis-streams
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_STREAMS_PASSWORD:-}
    ports:
      - "${REDIS_STREAMS_PORT:-6380}:6379"
    volumes:
      - redis_streams_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - trading-network

  # ============================================================================
  # Prometheus - Metrics collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - trading-network
    depends_on:
      - timescaledb

  # ============================================================================
  # Grafana - Metrics visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - trading-network
    depends_on:
      - prometheus

# ============================================================================
# Networks
# ============================================================================
networks:
  trading-network:
    driver: bridge
    name: trading-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  timescale_data:
    name: trading_timescale_data
  redis_cache_data:
    name: trading_redis_cache_data
  redis_streams_data:
    name: trading_redis_streams_data
  prometheus_data:
    name: trading_prometheus_data
  grafana_data:
    name: trading_grafana_data
